name: contracts-ci

# FairValue 3대 계약 v0.1 — 재현성·합계·교차해시·폼 bind 게이트.
# PR 필수 통과:
#   Python(reproducer CLI + pytest) / Kotlin(InputHash 교차검증) /
#   Frontend(폼 스키마 vitest + bind 일치 검증기 + openapi lint).

on:
  pull_request:
    paths:
      - "shared/schemas/**"
      - "pricing-engine/**"
      - "backend/**"
      - "golden-values/**"
      - "frontend/**"
      - ".github/workflows/contracts-ci.yml"
  push:
    branches: [main, master]

jobs:
  python:
    name: python — hash vectors & golden
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: install deps
        run: pip install pydantic pytest
      - name: input_hash 재검증 (expected_hash 동결 확인)
        working-directory: pricing-engine
        run: python -m app.reproducer ../shared/schemas/hash-test-vectors.json
      - name: pytest (hash vectors + golden)
        working-directory: pricing-engine
        run: pytest tests -v

  kotlin:
    name: kotlin — InputHash 교차검증 + Auth 통합테스트
    runs-on: ubuntu-latest
    # 통합테스트(Testcontainers)는 ubuntu-latest 의 Docker 로 postgres 를 자동 기동한다.
    # 추가로 service 컨테이너도 제공해, env(DB_URL 등)로도 접속 가능하게 둔다.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fairvalue
          POSTGRES_USER: fairvalue
          POSTGRES_PASSWORD: fairvalue
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U fairvalue"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: wrapper jar 보장 (저장소에 없으면 생성)
        working-directory: backend
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            gradle wrapper --gradle-version 8.7
          fi
      - name: gradle test (InputHash 교차해시 + Auth 통합테스트)
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fairvalue
          DB_USER: fairvalue
          DB_PASSWORD: fairvalue
          JWT_SECRET: ci-only-secret-long-enough-32bytes-min!!
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  frontend:
    name: frontend — build · typecheck · form schema · bind 검증 · openapi lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install deps
        working-directory: frontend
        run: npm install
      - name: verify:all (vitest + verify:bind + lint:openapi)
        working-directory: frontend
        ru