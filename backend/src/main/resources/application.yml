# FairValue Backend — 공통 설정 (Phase 1-A)
# datasource 는 환경변수 기반(DB_URL/DB_USER/DB_PASSWORD). 로컬 기본값은 application-local.yml.
# 활성 프로필 기본값은 local (env SPRING_PROFILES_ACTIVE 로 override).

spring:
  application:
    name: fairvalue-backend
    version: "0.1.0"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fairvalue}
    username: ${DB_USER:fairvalue}
    password: ${DB_PASSWORD:fairvalue}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 스키마는 Flyway 가 관리한다. JPA 는 검증만(생성·변경 금지).
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

# JWT — 시크릿은 env(JWT_SECRET) 기반. 기본값은 개발용(운영은 반드시 override).
# HS256 사용으로 시크릿은 최소 32바이트 이상이어야 한다.
jwt:
  secret: ${JWT_SECRET:dev-only-secret-change-me-please-32bytes-minimum!!}
  expiration-minutes: ${JWT_EXP_MINUTES:120}

# springdoc(OpenAPI) — 의존성만 추가된 상태. 실제 openapi.yaml 대조/노출은 다음 단계.
springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ★ Phase 5-2: 파이싱 엔진(Python FastAPI) 연결.
#   mode=real(기본) → RealPricingEngineClient 가 base-url/price 호출.
#   mode=dummy      → DummyPricingEngineClient(자리표시, 테스트/오프라인용).
app:
  engine:
    base-url: ${ENGINE_BASE_URL:http://localhost:8000}
    mode: ${ENGINE_MODE:real}
